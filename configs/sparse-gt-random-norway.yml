# Sparse GT + RPEARL (random embedding) for Norway terrain
# Sweep-tuned hyperparameters (epochs=100, lr=0.0003, p=4)

sparse-gt-rpearl:
  gnn:
    constr:
      input: 3
      hidden: 128
      output: 128
      layers: 3
    layer_norm: false
    dropout: true
    activation: lrelu

    sparse_gt:
      hidden_dim: 128
      num_layers: 2
      num_heads: 2
      num_hops: 4
      rpearl_samples: 30
      rpearl_num_layers: 5
      pe_k: 4
      dropout: 0.3
      attn_dropout: 0.07

  mlp:
    constr:
      input: 128
      hidden: 128
      output: 1
      layers: 3
    layer_norm: false
    dropout: true
