# Sparse GT + RPEARL (data embedding) for Philadelphia terrain
# Sweep-tuned hyperparameters (epochs=100, lr=0.0035, p=4)

sparse-gt-rpearl:
  gnn:
    constr:
      input: 3
      hidden: 128
      output: 128
      layers: 3
    layer_norm: false
    dropout: true
    activation: lrelu

    sparse_gt:
      hidden_dim: 128
      num_layers: 6
      num_heads: 8
      num_hops: 5
      rpearl_samples: 30
      rpearl_num_layers: 6
      pe_k: 2
      dropout: 0.5
      attn_dropout: 0.2

  mlp:
    constr:
      input: 64
      hidden: 64
      output: 1
      layers: 3
    layer_norm: false
    dropout: true
