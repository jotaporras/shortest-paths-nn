# Sparse GT + RPEARL for Philadelphia terrain
# Sweep-tuned hyperparameters (epochs=100, lr=0.008, p=4)

sparse-gt-rpearl:
  gnn:
    constr:
      input: 3
      hidden: 256
      output: 256
      layers: 3
    layer_norm: false
    dropout: true
    activation: lrelu

    sparse_gt:
      hidden_dim: 256
      num_layers: 6
      num_heads: 8
      num_hops: 4
      rpearl_samples: 30
      rpearl_num_layers: 5
      pe_k: 3
      dropout: 0.15
      attn_dropout: 0.0003

  mlp:
    constr:
      input: 256
      hidden: 256
      output: 1
      layers: 3
    layer_norm: false
    dropout: true
